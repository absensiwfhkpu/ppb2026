<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi WFH KPU PPB</title>
  <link rel="icon" href="https://cdn.brandfetch.io/id4BCq6HEO/w/477/h/477/theme/dark/logo.png?c=1dxbfHSJFAPEGdCLU4o5B" type="image/x-icon">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 30px;
      box-sizing: border-box;
    }

    .iframe-container {
      position: relative;
      width: 480px;
      height: 600px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #666;
      z-index: 10;
    }

    /* Responsif untuk HP */
    @media (max-width: 500px) {
      .iframe-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loader" id="loader">Loading app...</div>
    <iframe 
      src="https://script.google.com/macros/s/AKfycbz_omZo4V3Fl3Nm3LdqYcI2tMPtkkxrmuIpv7BEUH-Dw-1cFZYIIGbKnJvvmdyN4mEchg/exec" 
      title="Absensi WFH KPU PPB"
      onload="document.getElementById('loader').style.display='none';"
      allow="geolocation; camera; microphone"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
